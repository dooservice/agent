# dooservice agent — configuration file
# Generated automatically. Edit the values below and restart the agent.

nats_url      = ""
nats_user     = "agent"
nats_password = ""
region        = ""
heartbeat_interval     = 30
max_concurrent_backups = 3

[sdk]
# All subpaths derive from data_dir:
#   {data_dir}/agent.db     {data_dir}/pgdog
#   {data_dir}/letsencrypt  {data_dir}/projects
data_dir           = "/var/lib/dooservice"
debug              = false
capture_api_secret = ""
capture_hostname   = ""   # subdomain for the capture service: <hostname>.<base_domain>. Defaults to OS hostname if empty.

# ── PostgreSQL ─────────────────────────────────────────────────────────────────
# Tune based on available RAM:
#   shared_buffers      = 25% of RAM
#   effective_cache_size = 75% of RAM
[sdk.postgres]
superuser_password   = "change_me"
max_connections      = 300
shared_buffers       = "512MB"
effective_cache_size = "1536MB"
work_mem             = "8MB"
maintenance_work_mem = "64MB"
random_page_cost          = "1.1"
effective_io_concurrency  = 200
wal_compression              = "on"
checkpoint_completion_target = "0.9"
max_wal_size = "2GB"
min_wal_size = "512MB"
autovacuum_max_workers         = 4
autovacuum_naptime             = "30s"
autovacuum_vacuum_scale_factor = "0.05"
tcp_keepalives_idle     = 60
tcp_keepalives_interval = 10
tcp_keepalives_count    = 6
idle_in_transaction_session_timeout = "300s"
idle_session_timeout                = "600s"
statement_timeout                   = "300s"

# ── PgDog connection pooler ────────────────────────────────────────────────────
# pooler_mode must be "session" — transaction mode breaks Odoo longpolling.
[sdk.pgdog]
workers           = 4
pooler_mode       = "session"
default_pool_size = 10
min_pool_size     = 1
connect_timeout   = 5000
checkout_timeout  = 10000
idle_timeout      = 300000
server_lifetime   = 3600000

# ── Proxy / Traefik ────────────────────────────────────────────────────────────
[sdk.proxy]
base_domain       = ""
server_ip         = ""
acme_email        = ""
dns_provider      = ""
acme_staging      = false
acme_use_wildcard = false
dashboard_enabled = false
dashboard_domain  = ""

# ── DNS provider credentials ───────────────────────────────────────────────────
[sdk.dns]
cloudflare_api_token = ""
# cloudflare_email      = ""
# cloudflare_global_key = ""
# hetzner_api_key       = ""
# digitalocean_api_token = ""

# ── S3 backups (leave empty to keep backups local) ─────────────────────────────
[sdk.s3]
endpoint   = ""
access_key = ""
secret_key = ""
bucket     = "dooservice-backups"
region     = "us-east-1"
