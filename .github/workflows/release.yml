name: Release

on:
  push:
    tags:
      - "[0-9]*.[0-9]*.[0-9]*"

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build & publish standalone binary
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate git for private core repo
        run: |
          git config --global url."https://x-access-token:${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install Python 3.13
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --frozen

      - name: Build binary
        run: make agent-build

      - name: Smoke test
        run: ./dist/dooservice-agent --version

      - name: Extract version
        id: tag
        run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog entry
        id: changelog
        run: |
          VERSION="${{ steps.tag.outputs.version }}"
          BODY=$(awk "/^## \[${VERSION}\]/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md)
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          echo "$BODY" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ steps.tag.outputs.version }}"
          body: |
            ${{ steps.changelog.outputs.body }}

            ---

            ## Install

            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh | sudo bash
            ```

            Or download the binary below and place it in `/usr/local/bin/dooservice-agent`.
          files: dist/dooservice-agent
