# dooservice agent — example configuration
# Copy to /data/agent.toml and fill in your values.
# Override path: DOOSERVICE_AGENT_CONFIG=/custom/path/agent.toml

nats_url      = "nats://nats.example.com:4222"
nats_user     = "agent"
nats_password = "CHANGE_ME"
region        = "eu-west"
heartbeat_interval     = 30
max_concurrent_backups = 3

[sdk]
data_dir           = "/var/lib/dooservice"
debug              = false
capture_api_secret = "CHANGE_ME"
capture_hostname   = "server1"   # subdomain for this agent: server1.<base_domain>. Defaults to OS hostname if empty.

# ── PostgreSQL ─────────────────────────────────────────────────────────────────
[sdk.postgres]
superuser_password   = "change_me"
max_connections      = 300
shared_buffers       = "512MB"    # 25% of RAM
effective_cache_size = "1536MB"   # 75% of RAM
work_mem             = "8MB"
maintenance_work_mem = "64MB"
random_page_cost          = "1.1"
effective_io_concurrency  = 200
wal_compression              = "on"
checkpoint_completion_target = "0.9"
max_wal_size = "2GB"
min_wal_size = "512MB"
autovacuum_max_workers         = 4
autovacuum_naptime             = "30s"
autovacuum_vacuum_scale_factor = "0.05"
tcp_keepalives_idle     = 60
tcp_keepalives_interval = 10
tcp_keepalives_count    = 6
idle_in_transaction_session_timeout = "300s"
idle_session_timeout                = "600s"
statement_timeout                   = "300s"

# ── PgDog ──────────────────────────────────────────────────────────────────────
[sdk.pgdog]
workers           = 4
pooler_mode       = "session"
default_pool_size = 10
min_pool_size     = 1
connect_timeout   = 5000
checkout_timeout  = 10000
idle_timeout      = 300000
server_lifetime   = 3600000

# ── Proxy / Traefik ────────────────────────────────────────────────────────────
[sdk.proxy]
base_domain        = "clientes.example.com"
secondary_domains  = []                      # e.g. ["otro.example.com", "clients.example.io"]
server_ip          = "1.2.3.4"
acme_email         = "admin@example.com"
dns_provider       = "cloudflare_token"
acme_staging       = false
acme_use_wildcard  = false
dashboard_enabled  = false
dashboard_domain   = ""

# ── DNS provider credentials ───────────────────────────────────────────────────
[sdk.dns]
cloudflare_api_token = ""
# cloudflare_email       = ""
# cloudflare_global_key  = ""
# hetzner_api_key        = ""
# digitalocean_api_token = ""

# ── S3 backups ─────────────────────────────────────────────────────────────────
[sdk.s3]
endpoint   = ""
access_key = ""
secret_key = ""
bucket     = "dooservice-backups"
region     = "us-east-1"
